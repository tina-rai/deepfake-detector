<!DOCTYPE html>
<html>
  <head>
    <title>DeepScan</title>

    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
      }

      .container {
        width: 500px;
        margin: auto;
        margin-top: 80px;
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
      }

      .drop-area {
        border: 2px dashed #38bdf8;
        padding: 40px;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 20px;
      }

      .drop-area:hover {
        background: #334155;
      }

      #fileElem {
        display: none;
      }

      button {
        padding: 10px 20px;
        border: none;
        background: #38bdf8;
        cursor: pointer;
        border-radius: 5px;
      }

      img {
        width: 300px;
        margin-top: 20px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Deepfake Detector</h1>

      <form action="/upload" method="POST" enctype="multipart/form-data">
        <!-- CLICKABLE AREA -->
        <label class="drop-area" for="fileElem"> Click to Choose File </label>

        <!-- REAL INPUT -->
        <input
          type="file"
          id="fileElem"
          name="file"
          accept="image/*"
          required
        />

        <p id="fileName"></p>

        <button type="submit">Analyze</button>
      </form>
    </div>

    <script>
      const fileInput = document.getElementById("fileElem");
      const fileName = document.getElementById("fileName");

      fileInput.addEventListener("change", function () {
        if (fileInput.files.length > 0) {
          fileName.innerText = "Selected: " + fileInput.files[0].name;
        }
      });
    </script>
  </body>
</html>
